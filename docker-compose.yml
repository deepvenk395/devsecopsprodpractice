services:
  web:
    build: .
    ports:
      - "4173:4173"
    environment:
      NODE_ENV: production
      PORT: 4173
    read_only: true
    tmpfs:
      - /tmp
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    healthcheck:
      test: ["CMD-SHELL", "http://localhost:4173/health || exit 1"]
      interval: 1m30s
      timeout: 30s
      retries: 4
      start_period: 30s

name: DevSecOps CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write

jobs:
  verify:
    name: Test and security checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run tests and security checks
        run: npm run ci

      - name: Dependency audit
        run: npm audit --audit-level=high

  container:
    name: Container build gate
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build image
        run: docker build -t devsecops-lab:${{ github.sha }} .

      - name: Smoke test image
        run: |
          docker run -d --rm -p 4173:4173 --name devsecops-lab devsecops-lab:${{ github.sha }}
          sleep 3
          curl --fail http://127.0.0.1:4173/healthz
          docker stop devsecops-lab
